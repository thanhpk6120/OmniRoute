# ──────────────────────────────────────────────────────────────────────
#  OmniRoute fork — Auto build + publish image to GHCR
# ──────────────────────────────────────────────────────────────────────
#
#  Triggers:
#    • Push tag matching v*    → build + tag image with the version
#    • Push to thanhpk6120     → build + tag image as :latest, :branch
#    • Manual workflow_dispatch with explicit version input
#
#  Result:
#    Image is pushed to ghcr.io/${{ github.repository_owner }}/omniroute
#    e.g. ghcr.io/thanhpk6120/omniroute:v3.8.0.1
#         ghcr.io/thanhpk6120/omniroute:latest
#
#  No external secrets needed — uses GITHUB_TOKEN to authenticate against GHCR.
#
#  How to grant the workflow push access (one-time setup):
#    1. Repo → Settings → Actions → General → Workflow permissions:
#         Read and write permissions
#    2. (Optional) Make the published image public:
#         GitHub profile → Packages → omniroute → Package settings → Change visibility
# ──────────────────────────────────────────────────────────────────────

name: Fork — Publish image to GHCR

on:
  push:
    branches:
      - thanhpk6120
    tags:
      - "v*"
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/workflows/build-fork.yml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/claude*.yml"
      - ".github/workflows/electron-release.yml"
      - ".github/workflows/npm-publish.yml"
      - ".github/workflows/docker-publish.yml"
      - ".github/workflows/deploy-vps.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to apply (e.g. 3.8.0.1)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: fork-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/omniroute
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LC}/omniroute"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

          TAGS=""
          SHA_SHORT="${GITHUB_SHA:0:7}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
            TAGS="${IMAGE}:v${VERSION},${IMAGE}:${VERSION},${IMAGE}:latest,${IMAGE}:sha-${SHA_SHORT}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAGS="${IMAGE}:v${VERSION},${IMAGE}:${VERSION},${IMAGE}:latest,${IMAGE}:sha-${SHA_SHORT}"
          else
            BRANCH="${GITHUB_REF_NAME//\//-}"
            TAGS="${IMAGE}:${BRANCH},${IMAGE}:latest,${IMAGE}:sha-${SHA_SHORT}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Will tag image with: ${TAGS}"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runner-base
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Summary
        run: |
          {
            echo "## Image published"
            echo ""
            echo "Tags:"
            echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n' | sed 's/^/- `/' | sed 's/$/`/'
            echo ""
            echo "Pull on the server:"
            echo ""
            echo '```bash'
            echo "docker pull ${{ steps.tags.outputs.image }}:latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

# ──────────────────────────────────────────────────────────────────────
#  OmniRoute — Server compose (pull pre-built image, no local build)
# ──────────────────────────────────────────────────────────────────────
#
#  Pulls the image built by GitHub Actions from GHCR.
#  Server only needs Docker + this file + .env. No source code, no Node,
#  no `npm run build` on the box.
#
#  Data persistence:
#    • ./data           ── bind-mounted to /app/data inside the container.
#                         Survives image rebuilds, container recreates,
#                         and `docker compose down` (without -v).
#    • redis-data       ── named volume for Redis. Survives the same way.
#
#  CRITICAL: never run `docker compose -f docker-compose.server.yml down -v`
#  ──────────  the `-v` flag wipes named volumes (Redis state).
#  Bind-mounted ./data is ALWAYS safe — `-v` does not touch host paths.
#
#  Usage:
#    1. Place this file + .env on the server (any directory)
#    2. mkdir -p ./data            # bind-mount target
#    3. docker compose -f docker-compose.server.yml pull
#    4. docker compose -f docker-compose.server.yml up -d
#    5. docker compose -f docker-compose.server.yml logs -f --tail 100
#
#  Update flow:
#    docker compose -f docker-compose.server.yml pull \
#      && docker compose -f docker-compose.server.yml up -d
#
#  Pin to a specific version (recommended for production):
#    OMNIROUTE_IMAGE_TAG=v3.8.0.1 docker compose -f docker-compose.server.yml up -d
#
#  Rollback to a previous version:
#    OMNIROUTE_IMAGE_TAG=v3.8.0.0 docker compose -f docker-compose.server.yml up -d
# ──────────────────────────────────────────────────────────────────────

services:
  # ── Redis (Rate Limiter Backend) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: omniroute-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── OmniRoute (image pulled from GHCR — no build) ─────────────────
  omniroute:
    image: ghcr.io/thanhpk6120/omniroute:${OMNIROUTE_IMAGE_TAG:-latest}
    container_name: omniroute
    restart: unless-stopped
    stop_grace_period: 40s
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      - DATA_DIR=/app/data
      - PORT=${PORT:-20128}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-${PORT:-20128}}
      - API_PORT=${API_PORT:-20129}
      - API_HOST=${API_HOST:-0.0.0.0}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - HOSTNAME=0.0.0.0
    ports:
      - "${DASHBOARD_PORT:-${PORT:-20128}}:${DASHBOARD_PORT:-${PORT:-20128}}"
      - "${API_PORT:-20129}:${API_PORT:-20129}"
    volumes:
      # Host bind-mount → image rebuilds never touch this directory.
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "healthcheck.mjs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  redis-data:
    name: omniroute-redis-data
